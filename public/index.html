<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Fuboru AI Chat</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="w-full max-w-2xl h-[90vh] bg-white rounded-2xl shadow-xl flex flex-col">
      <!-- Header -->
      <div class="border-b p-4 font-semibold text-lg">Fuboru AI Guide</div>

      <!-- Chat Box -->
      <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-50"></div>

      <!-- Input Area -->
      <form id="chat-form" class="border-t p-4 flex gap-2">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" class="flex-1 border rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <select name="mode" id="mode-select" class="border rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="default">Default</option>
          <option value="stream">Stream</option>
        </select>
        <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-xl">Send</button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
